<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie</title>
    <link rel="stylesheet" href="../../assets/CSS/backround.css">
    <link rel="stylesheet" href="../../assets/CSS/ui.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="home.html" class="home"><h1>MOVBINGE</h1></a>
        </div>
        <ul>
            <li><a href="../user/my_acc.html">Profile</a></li>
            <li><a href="../user/acc_contribution.html">My Contributions</a></li>
            <li><a href="../loging/login.html">Log Out</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="title">EDIT MOVIE</h1>

        <div class="box box-wide">
            <form>
                <input type="hidden" name="hiddenID" value="">

                <div class="acc-group">
                    <label>Movie Title</label>
                    <input type="text" name="mtitle" value="" placeholder="Loading title...">
                </div>

                <div class="input-row">
                    <div class="acc-group">
                        <label>Genre</label>
                        <input type="text" name="mgenre" value="" placeholder="Loading genre...">
                    </div>
                    <div class="acc-group">
                        <label>Release Year</label>
                        <input type="text" name="myear" value="" placeholder="Loading year...">
                    </div>
                </div>

                <div class="input-row">
                    <div class="acc-group">
                        <label>Director</label>
                        <input type="text" name="mdir" value="" placeholder="Loading director...">
                    </div>
                    <div class="acc-group">
                        <label>Main Cast</label>
                        <input type="text" name="mcast" value="" placeholder="Loading cast...">
                    </div>
                </div>

                <div class="acc-group">
                    <label>Description</label>
                    <input type="text" name="mdesc" value="" placeholder="Loading description...">
                </div>

                <div class="btn-group">
                    <input type="submit" name="update" value="UPDATE MOVIE" class="btn">
                    <a href="../user/acc_contribution.html" style="color: #666; font-size: 0.9rem; text-decoration: none;">Go Back</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
