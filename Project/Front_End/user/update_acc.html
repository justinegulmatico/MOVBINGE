<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Account</title>
    <link rel="stylesheet" href="../../assets/CSS/backround.css">
    <link rel="stylesheet" href="../../assets/CSS/ui.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="../movies/home.html" class="home"><h1>MOVBINGE</h1></a>
        </div>
        <ul>
            <li><a href="my_acc.html">Profile</a></li>
            <li><a href="acc_contribution.html">My Contributions</a></li>
            <li><a href="../loging/login.html">Log Out</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="title">UPDATE ACCOUNT</div>
        
        <section class="box">
            <div class="error-mes" style="display: none;">
                <p>An error occurred while updating your account.</p>
            </div>

            <form>
                <div class="info">
                    <div class="acc-group">
                        <label>Username</label>
                        <input type="text" name="username" value="" placeholder="Current Username" required>
                    </div>
                    <div class="acc-group">
                        <label>Email</label>
                        <input type="email" name="email" value="" placeholder="Current Email" required>
                    </div>
                    <div class="acc-group">
                        <label>Password</label>
                        <input type="text" name="password" value="" placeholder="New Password" required>
                    </div>
                </div>

                <div class="btn-group">
                    <input class="btn" type="submit" value="Submit">
                    <a href="my_acc.html" class="btn" style="background-color: #333;">Go Back</a>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
